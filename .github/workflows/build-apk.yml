name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Change wrapper permissions (if exists)
      run: |
        if [ -f "android/gradlew" ]; then
          chmod +x android/gradlew
        fi

    - name: Build with Gradle
      run: |
        cd android
        # Se o gradle wrapper não existir, usamos um gradle geral ou instalamos
        if [ -f "./gradlew" ]; then
          ./gradlew assembleDebug
        else
          # Se não houver wrapper, instalamos o Gradle na máquina virtual para compilar
          sudo apt-get update && sudo apt-get install -y gradle
          gradle assembleDebug
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
